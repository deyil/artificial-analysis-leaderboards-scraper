# Configuration file

# The Artificial Analysis URL to scrape the leaderboard data from. In case of different leaderboard queries, just update this URL.
## Default: "https://artificialanalysis.ai/leaderboards/providers/prompt-options/single/medium_coding?deprecation=all"
target_url: "https://artificialanalysis.ai/leaderboards/providers/prompt-options/single/medium_coding?deprecation=all"

# The path to save the scraped leaderboard data to.
output_csv_path: "data/leaderboard.csv"

# Whether to append a timestamp to the output filename.
output_add_timestamp: true

# Whether to localize decimal-looking numeric values before writing the CSV.
# When false, scraped table values are written as-is.
output_localize_numbers: true

# Locale used to format decimal-looking numeric values in CSV output.
# Default: Greek locale.
output_locale: "el_GR"